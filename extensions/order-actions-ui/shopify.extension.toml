api_version = "2025-07"

[[extensions]]
name = "BadgeHQ Order Actions"
handle = "order-actions-ui"
type = "ui_extension"

  [extensions.capabilities]
  # network_access temporarily removed so the app version can RELEASE without
  # Shopify's network-access approval — which was blocking the whole version,
  # including the Order Actions theme block. Re-add `network_access = true`
  # and request approval in the Dev Dashboard when enabling this React
  # extension's checkout Thank-you / New-Customer-Accounts surfaces.

  # Thank-you page (post-purchase, may be a guest).
  [[extensions.targeting]]
  module = "./src/ThankYou.tsx"
  target = "purchase.thank-you.block.render"

  # New customer accounts order page (always logged in).
  [[extensions.targeting]]
  module = "./src/OrderStatus.tsx"
  target = "customer-account.order-status.block.render"
