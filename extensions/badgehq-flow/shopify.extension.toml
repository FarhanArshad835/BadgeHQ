api_version = "2025-01"
uid = "548a71aa-1f6c-e344-4780-c9fdc8670cbdf06fb5f5"

# Flow custom trigger fired when a variant a shopper is waiting on comes back
# in stock. Shopify has no API to email a shopper directly, so this trigger is
# how the notification reaches them: the merchant builds ONE marketing
# automation (this trigger -> Send marketing email) and Shopify Email does the
# sending. The customer_reference property is what lets that automation address
# the shopper — a marketing automation cannot be built without it.
[[extensions]]
name = "BadgeHQ back in stock"
type = "flow_trigger"
handle = "badgehq-back-in-stock"
description = "Fires when a product a customer asked to be notified about is back in stock."

# Per Shopify's docs this is a TOP-LEVEL table (not nested under [[extensions]])
# and the array is [[settings.fields]] — plural. Getting either wrong makes
# Shopify silently drop every field, leaving only `shop` in Flow's variable
# picker and breaking the "Send marketing email" action with "Customer needed".
[settings]

  # The shopper to email. Sent as `customer_id` in the trigger payload.
  [[settings.fields]]
  type = "customer_reference"

  # Keys are single words: Shopify allows only alphabetic characters and
  # spaces, and a key with a space is ambiguous in the email's Liquid.
  # Payload keys in fireRestockTrigger() must match these exactly.
  [[settings.fields]]
  type = "single_line_text_field"
  key = "producttitle"

  [[settings.fields]]
  type = "single_line_text_field"
  key = "varianttitle"

  [[settings.fields]]
  type = "single_line_text_field"
  key = "producturl"

  [[settings.fields]]
  type = "single_line_text_field"
  key = "productimage"
