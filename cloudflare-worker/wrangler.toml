name = "badgehq-widget"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Free plan limits: 100K requests/day = 3M/month free, then $5/month + $0.50/M.
# This worker just serves a static string + cache headers — < 1ms CPU per request,
# trivially under any plan's CPU limits. The bundled widget.js source is ~80KB
# raw / ~20KB gzipped — well under the 1MB free-plan script size limit.

# When deploying, the worker is reachable at:
#   https://badgehq-widget.<your-account-subdomain>.workers.dev/widget.js
#
# After verifying it works there, you can bind a custom domain like
# widget.badge-hq.com via the Cloudflare dashboard (Workers & Pages → your
# worker → Settings → Triggers → Custom Domains).

[observability]
enabled = true
